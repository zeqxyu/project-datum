<!DOCTYPE html>
<html lang="si">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js" integrity="sha384-7qAoOXltbVP82dhxHAUje59V5r2YsVfBafyUDxEdApLPmcdhBPg1DKg1ERo0BZlK" crossorigin="anonymous"></script>

	<style>
		.username {
			max-width: 50vw;
			font-weight: 600;
			text-align: center;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			display: inline-block;
			font-size: clamp(0.8rem, 5vw - 0.5rem, 1.4rem); /* Адаптив */
		}
	</style>

	{% block head %}{% endblock head %}
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

</head>
<body data-bs-theme="dark">
	<nav class="navbar bg-dark px-2">
		<!-- Левая кнопка меню -->
		<button class="btn btn-dark" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuOffcanvas">
		  <i class="bi bi-list fs-3"></i>
		</button>
	  
		<!-- Имя пользователя -->
		<div class="mx-auto username">
			<span class="username">
				<span id="user_firstname"></span>
				<span id="user_lastname"></span>
			</span>
		</div>
	  
		<!-- Правая иконка уведомлений -->
		<button class="btn btn-dark" 
				id="notif-icon" 
				type="button" 
				data-bs-toggle="offcanvas" 
				data-bs-target="#notificationsOffcanvas"
				style="position: relative;">
			<i class="bi bi-bell fs-4"></i>
			<span id="notif-badge" 
			style="
				position: absolute;
				top: 2px;
				right: 2px;
				background-color: red;
				width: 10px;
				height: 10px;
				border-radius: 50%;
				display: none;
			">
			</span>
		</button>
	</nav>
	  
	  <!-- Шторка: Меню -->
	<div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="menuOffcanvas">
		<div class="offcanvas-header d-flex justify-content-between align-items-center">
			<div class="d-flex align-items-center gap-3">
				<button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
				<div class="username" style="max-width: 200px; font-size: clamp(0.8rem, 3vw, 1.2rem); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
					<span id="username"></span>
				</div>
			</div>
			<h5 class="offcanvas-title mb-0">Meni</h5>
		</div>
		    
		<div class="offcanvas-body d-flex flex-column justify-content-between p-0">
			<div class="list-group list-group-flush">
				<button class="list-group-item list-group-item-action d-flex align-items-center px-4 py-3" onclick="window.location.href=''">
					<i class="bi bi-person-circle me-3"></i>
					<span class="flex-grow-1">Moj račun</span>
				</button>
				<button class="list-group-item list-group-item-action d-flex align-items-center text-warning px-4 py-4" id="user_money_btn">
					<i class="bi bi-coin me-3"></i>
					<span class="flex-grow-1" id="user_money">
						
					</span>
				</button>
				<button class="list-group-item list-group-item-action d-flex align-items-center text-warning px-4 py-4" id="user_jc_btn">
					<i class="bi bi-braces-asterisk me-3"></i>
					<span class="flex-grow-1" id="user_jc">
						
					</span>
				</button>
				<button class="list-group-item list-group-item-action d-flex align-items-center px-4 py-3">
					<i class="bi bi-calendar-event me-3"></i>
					<span class="flex-grow-1">Moj koledar</span>
				</button>
				<button class="list-group-item list-group-item-action d-flex align-items-center px-4 py-3">
					<i class="bi bi-clipboard-check me-3"></i>
					<span class="flex-grow-1">Ocenjevanja</span>
					{% comment %} <span class="badge bg-danger rounded-pill">1</span> {% endcomment %}
				</button>
				<button class="list-group-item list-group-item-action d-flex align-items-center px-4 py-3">
					<i class="bi bi-people me-3"></i>
					<span class="flex-grow-1">Moj razred</span>
				</button>
			</div>
		  
			<div class="list-group list-group-flush mt-3">
				<button class="list-group-item list-group-item-action d-flex align-items-center px-4 py-3">
					<i class="bi bi-bug me-3"></i>
					<span class="flex-grow-1">Prijava tehničnih napak</span>
				</button>
				<button class="list-group-item list-group-item-action d-flex align-items-center px-4 py-3">
					<i class="bi bi-code-slash me-3"></i>
					<span class="flex-grow-1">Razvijalci</span>
				</button>
				<button class="list-group-item list-group-item-action d-flex align-items-center px-4 py-3 text-danger">
					<i class="bi bi-box-arrow-right me-3"></i>
					<span class="flex-grow-1">Odjava</span>
				</button>
			</div>
		</div>	  
	</div>
	
	<!-- Шторка: Уведомления -->
	<div class="offcanvas offcanvas-end text-bg-dark" tabindex="-1" id="notificationsOffcanvas">
		<div class="offcanvas-header">
		<h5 class="offcanvas-title">Obvestila</h5>
			<button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
		</div>
		<div class="offcanvas-body p-0">
			<div class="list-group list-group-flush" id="notifications"> 

			
			</div>
		</div>
	</div>
	
	<!-- СЮДА ВСЕ МЯСО -->

	{% block content %}{% endblock content %}

	<script>
		// Временно так, потом через fetch('api_link')

		menu_data = {
			"student_data": {
				"firstname": "Janez",
				"lastname": "Novak",
				"username": "jannov_1",
		
				"status": false,
				
				"money": "1350",
				"justice_coefficient": "0.86"
			},
			"notifications": [
				{
					"code": "jannov1_assessment_001",
					"type": "assessment",
					"time": "2025-10-13T14:01:03",
					"text": "Novo ocenjevanje iz MAT",
					"unread": false,
					"link": ""
				},
				{
					"code": "jannov1_datum_001",
					"type": "datum",
					"time": "2025-10-13T14:01:03",
					"text": "Dobili datum iz \"1. ustno ocenjevanje iz matematike\". Datum: 13.11",
					"unread": false,
					"link": ""
				},
				{
					"code": "jannov1_money_001",
					"type": "money",
					"time": "2025-10-13T14:01:03",
					"text": "Odšteto vam je 350$.",
					"unread": false,
					"link": ""
				},
				{
					"code": "jannov1_justice_coefficient_001",
					"type": "justice_coefficient",
					"time": "2025-10-13T14:01:03",
					"text": "Spremenjen pravičnostni koeficient: 1.21 -> 0.86",
					"unread": false,
					"link": ""
				},
				{
					"code": "jannov1_system_message_001",
					"type": "system_message",
					"time": "2025-10-13T14:01:03",
					"text": "Dobili ste odgovor na prijavo tehnične napake.",
					"unread": false,
					"link": ""
				},
				{
					"code": "jannov1_swap_001",
					"type": "swap",
					"time": "2025-10-13T14:01:03",
					"text": "Aleks Benedetti želi zamenjati z vami datum za MAT.",
					"unread": false,
					"link": ""
				}
			]
		}

		function setText(id, text) {
			const el = document.getElementById(id);
			if (el) {
				el.textContent = text;
			}
		}

		setText("user_firstname", menu_data.student_data.firstname);
		setText("user_lastname", menu_data.student_data.lastname);
		setText("username", menu_data.student_data.username);
		setText("user_money", menu_data.student_data.money);
		setText("user_jc", menu_data.student_data.justice_coefficient);

		if (menu_data.student_data.status) { 
			const moneyEl = document.getElementById("user_money_btn");
			const jcEl = document.getElementById("user_jc_btn");
		
			moneyEl.style.setProperty("display", "none", "important");
			jcEl.style.setProperty("display", "none", "important");
		}

		// Нотификации

		const notifStyles = {
			"assessment": {
				"bg_color": "bg-primary",
				"text_color": "text-white",
				"time_color": "text-secondary-emphasis",
				"icon": "bi-calendar-week"
			},
			"datum": {
				"bg_color": "bg-warning",
				"text_color": "text-dark",
				"time_color": "text-secondary",
				"icon": "bi-calendar-date"
			},
			"money": {
				"bg_color": "bg-dark",
				"text_color": "text-white",
				"time_color": "text-secondary",
				"icon": "bi-coin"
			},
			"justice_coefficient": {
				"bg_color": "bg-dark",
				"text_color": "text-white",
				"time_color": "text-secondary",
				"icon": "bi-info-circle"
			},
			"swap": {
				"bg_color": "bg-warning",
				"text_color": "text-dark",
				"time_color": "text-secondary",
				"icon": "bi-shuffle"
			},
			"system_message": {
				"bg_color": "bg-dark",
				"text_color": "text-white",
				"time_color": "text-secondary",
				"icon": "bi-code-slash"
			},
			"penalty": {
				"bg_color": "bg-danger",
				"text_color": "text-white",
				"time_color": "text-secondary-emphasis",
				"icon": "bi-slash_square"
			}
		};
	
		function formatDate(dateStr) {
			const date = new Date(dateStr);
			return date.toLocaleString('sl-SI', {
				day: 'numeric',
				month: 'numeric',
				year: 'numeric',
				hour: '2-digit',
				minute: '2-digit'
			});
		}
	
		function renderNotifications(data) {
			const container = document.getElementById('notifications');
			container.innerHTML = ''; // очистить
	
			data.notifications.forEach(notif => {
				const style = notifStyles[notif.type] || {
					bg_color: 'bg-secondary',
					text_color: 'text-white',
					time_color: 'text-secondary',
					icon: 'bi-info-circle'
				};
	
				const btn = document.createElement('button');
				btn.className = `list-group-item ${style.bg_color} ${style.text_color} px-4 py-3 border-0`;
				btn.type = 'button';
	
				// если есть ссылка, добавляем переход по клику
				if (notif.link && notif.link.trim() !== '') {
					btn.onclick = () => { window.location.href = notif.link };
				}
	
				btn.innerHTML = `
					<div class="small ${style.time_color} mb-1 text-start">${formatDate(notif.time)}</div>
					<div class="d-flex align-items-center text-start">
						<i class="bi ${style.icon} me-3 fs-5"></i>
						<div class="flex-grow-1">${notif.text}</div>
					</div>
				`;
	
				container.appendChild(btn);
			});
		}
	
		// Вызовем функцию с menu_data из твоего скрипта
		renderNotifications(menu_data);

		// Показываем красную точку, если хотя бы одно уведомление с unread=true
		const notifBadge = document.getElementById("notif-badge");
		const hasUnread = menu_data.notifications.some(n => n.unread === true);
		if (notifBadge) {
			notifBadge.style.display = hasUnread ? "block" : "none";
		}

		// изменение unread в нотификациях при открытии шторки уведомлений

		document.addEventListener("DOMContentLoaded", () => {
			const notifIcon = document.getElementById("notif-icon");
			if (!notifIcon) return;
		  
			notifIcon.addEventListener("click", () => {
			  const changedNotifications = menu_data.notifications
				.filter(n => n.unread)
				.map(n => ({ code: n.code, unread: false }));
		  
			  console.log(JSON.stringify(changedNotifications, null, 2));
			});
		  });

	</script>

	<!-- JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<!-- Bootstrap Icons -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</body>
</html>
